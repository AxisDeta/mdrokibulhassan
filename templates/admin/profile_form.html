<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 6rem 2rem 2rem;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        .form-container {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }

        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .form-section:last-child {
            border-bottom: none;
        }

        .form-section h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-primary);
            transition: all var(--transition-fast);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: var(--bg-primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group small {
            display: block;
            margin-top: 0.25rem;
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-cancel:hover {
            background: var(--bg-tertiary);
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('index') }}" class="logo">
                <span class="logo-text">MD ROKIBUL HASAN</span>
            </a>

            <ul class="nav-menu">
                <li><a href="{{ url_for('admin_dashboard') }}" class="nav-link">Dashboard</a></li>
                <li><a href="{{ url_for('admin_logout') }}" class="nav-link"><i class="fas fa-sign-out-alt"></i>
                        Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-user-edit"></i> Edit Profile</h1>
        </div>

        <div class="form-container">
            <form method="POST" enctype="multipart/form-data">
                <!-- Basic Information -->
                <div class="form-section">
                    <h2>Basic Information</h2>

                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name"
                            value="{{ profile.full_name if profile else '' }}">
                    </div>

                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" value="{{ profile.title if profile else '' }}">
                        <small>e.g., MBA - Business Analytics</small>
                    </div>

                    <div class="form-group">
                        <label for="affiliation">Affiliation</label>
                        <input type="text" id="affiliation" name="affiliation"
                            value="{{ profile.affiliation if profile else '' }}">
                        <small>e.g., Gannon University</small>
                    </div>

                    <div class="form-group">
                        <label for="bio">Biography</label>
                        <textarea id="bio" name="bio" rows="6">{{ profile.bio if profile else '' }}</textarea>
                    </div>
                </div>

                <!-- Contact Information -->
                <div class="form-section">
                    <h2>Contact Information</h2>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" value="{{ profile.email if profile else '' }}">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" value="{{ profile.phone if profile else '' }}">
                    </div>

                    <div class="form-group">
                        <label for="linkedin_url">LinkedIn URL</label>
                        <input type="url" id="linkedin_url" name="linkedin_url"
                            value="{{ profile.linkedin_url if profile else '' }}">
                    </div>

                    <div class="form-group">
                        <label for="google_scholar_url">Google Scholar URL</label>
                        <input type="url" id="google_scholar_url" name="google_scholar_url"
                            value="{{ profile.google_scholar_url if profile else '' }}">
                    </div>
                </div>

                <!-- Citation Metrics -->
                <div class="form-section">
                    <h2>Citation Metrics</h2>

                    <div class="form-group">
                        <label for="total_citations">Total Citations</label>
                        <input type="number" id="total_citations" name="total_citations"
                            value="{{ profile.total_citations if profile else 0 }}" min="0">
                    </div>

                    <div class="form-group">
                        <label for="h_index">h-index</label>
                        <input type="number" id="h_index" name="h_index" value="{{ profile.h_index if profile else 0 }}"
                            min="0">
                    </div>

                    <div class="form-group">
                        <label for="i10_index">i10-index</label>
                        <input type="number" id="i10_index" name="i10_index"
                            value="{{ profile.i10_index if profile else 0 }}" min="0">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Profile
                    </button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-cancel">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
